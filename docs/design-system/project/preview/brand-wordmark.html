<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Wordmark</title></head>
<body><div class="card">
  <div style="display:flex;align-items:center;gap:14px">
    <img src="../assets/torqr-icon.svg" alt="" width="64" height="64" style="display:block">
    <div>
      <div style="font-family:var(--font-sans);font-weight:600;font-size:36px;letter-spacing:-1px;color:#1A1A1A;line-height:1">torqr</div>
      <div style="font-family:var(--font-sans);font-weight:400;font-size:11px;letter-spacing:1.5px;color:#008000;text-transform:uppercase;margin-top:4px">Wartungsmanagement</div>
    </div>
  </div>
  <hr class="sep">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;line-height:1.5;color:var(--muted-foreground)">
    <div><div class="label" style="margin-bottom:4px">Wordmark</div>weight 600 · letter-spacing −1px · always lowercase</div>
    <div><div class="label" style="margin-bottom:4px">Tagline</div>weight 400 · letter-spacing 1.5px · always UPPERCASE</div>
  </div>
  <hr class="sep">
  <div style="display:flex;gap:12px;align-items:center;background:#004D00;padding:14px 18px;border-radius:10px">
    <img src="../assets/torqr-icon-ghost-on-green.svg" alt="" width="40" height="40">
    <div>
      <div style="color:#fff;font-weight:600;font-size:22px;letter-spacing:-1px;line-height:1">torqr</div>
      <div style="color:#EF9F27;font-weight:400;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-top:3px">Wartungsmanagement</div>
    </div>
    <div style="margin-left:auto;font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.55)">on sidebar · ghost variant</div>
  </div>
</div></body></html>

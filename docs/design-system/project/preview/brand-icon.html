<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Pulse Icon</title></head>
<body><div class="card">
  <div style="display:flex;gap:24px;align-items:flex-end;justify-content:space-around">
    <div style="text-align:center">
      <img src="../assets/torqr-icon.svg" width="120" height="120" alt="" style="display:block;margin:0 auto;box-shadow:0 4px 12px rgba(0,0,0,.10);border-radius:22px">
      <div style="margin-top:10px;font-size:12px;font-weight:600">default</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">on white</div>
    </div>
    <div style="text-align:center">
      <img src="../assets/torqr-icon-dark.svg" width="120" height="120" alt="" style="display:block;margin:0 auto;box-shadow:0 4px 12px rgba(0,0,0,.10);border-radius:22px">
      <div style="margin-top:10px;font-size:12px;font-weight:600">dark</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">brand-700 bg</div>
    </div>
    <div style="text-align:center">
      <div style="background:#004D00;padding:10px;border-radius:14px;display:inline-block"><img src="../assets/torqr-icon-ghost-on-green.svg" width="100" height="100" alt="" style="display:block"></div>
      <div style="margin-top:10px;font-size:12px;font-weight:600">ghost</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground)">on sidebar</div>
    </div>
  </div>
  <hr class="sep">
  <div style="font-size:13px;line-height:1.6;color:var(--muted-foreground)">
    Abgerundetes Quadrat 96×96, <code style="font-family:var(--font-mono);font-size:12px;color:var(--foreground)">rx=22</code>. White EKG polyline, stroke 5.5px, with a single amber <span style="color:#EF9F27;font-weight:600">●</span> dot at (54, 58) — the moment the pulse spikes. Reads as &quot;die Anlage lebt&quot;.
  </div>
</div></body></html>

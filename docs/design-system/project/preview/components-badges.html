<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Badges</title></head>
<body><div class="card">
  <style>
    .b{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:9999px;border:1px solid;line-height:1}
    .dot{width:6px;height:6px;border-radius:50%}
  </style>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <span class="b" style="background:#E6F2E6;border-color:#99CC99;color:#006600"><span class="dot" style="background:#006600"></span>Wartung aktuell</span>
    <span class="b" style="background:#FAEEDA;border-color:#FAC775;color:#633806"><span class="dot" style="background:#633806"></span>Wartung fällig</span>
    <span class="b" style="background:#FAECE7;border-color:#F5C4B3;color:#712B13"><span class="dot" style="background:#712B13"></span>Überfällig</span>
    <span class="b" style="background:#E6F1FB;border-color:#B5D4F4;color:#0C447C"><span class="dot" style="background:#0C447C"></span>Hinweis</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <span class="b" style="background:#FAEEDA;border-color:#FAC775;color:#633806">▰ BETA</span>
    <span class="b" style="background:#E6F2E6;border-color:#CCDFCC;color:#008000">DSGVO-konform</span>
    <span class="b" style="background:#fff;border-color:#E0E0E0;color:#5C5C5C">🇩🇪 Made in Germany</span>
    <span class="b" style="background:#1A1A1A;border-color:#1A1A1A;color:#fff">OWNER</span>
    <span class="b" style="background:#fff;border-color:#E0E0E0;color:#1A1A1A">TECHNICIAN</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="b" style="background:#008000;border-color:#008000;color:#fff">12</span>
    <span class="b" style="background:#EF9F27;border-color:#EF9F27;color:#fff">Niedrig: 3</span>
  </div>
  <hr class="sep">
  <div style="font-size:12px;color:var(--muted-foreground);line-height:1.55">Pills only — radius 9999. Status combines bg + border + matching text. Role badges (OWNER / TECHNICIAN) are mono-tone.</div>
</div></body></html>

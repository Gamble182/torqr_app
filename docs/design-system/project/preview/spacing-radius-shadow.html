<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Radius & Shadow</title></head>
<body><div class="card">
  <div class="label" style="margin-bottom:10px">Radius scale</div>
  <div style="display:flex;gap:14px;align-items:flex-end;margin-bottom:18px">
    <div style="text-align:center"><div style="width:64px;height:64px;background:#E6F2E6;border:1px solid #99CC99;border-radius:8px"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:6px">sm · 8</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#E6F2E6;border:1px solid #99CC99;border-radius:10px"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:6px">md · 10</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#E6F2E6;border:1px solid #99CC99;border-radius:12px"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:6px">lg · 12 (base)</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#E6F2E6;border:1px solid #99CC99;border-radius:16px"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:6px">xl · 16</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#008000;border-radius:22px"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:6px">2xl · 22 (icon)</div></div>
    <div style="text-align:center"><div style="width:80px;height:28px;background:#E6F2E6;border:1px solid #99CC99;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#006600">pill</div><div style="font-size:11px;font-family:var(--font-mono);margin-top:6px">full · 9999</div></div>
  </div>
  <hr class="sep">
  <div class="label" style="margin-bottom:10px">Shadow scale</div>
  <div style="display:flex;gap:18px">
    <div style="text-align:center"><div style="width:96px;height:64px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:8px">shadow-sm</div></div>
    <div style="text-align:center"><div style="width:96px;height:64px;background:#fff;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.10)"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:8px">shadow-md</div></div>
    <div style="text-align:center"><div style="width:96px;height:64px;background:#fff;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12)"></div><div style="font-size:11px;font-family:var(--font-mono);margin-top:8px">shadow-lg</div></div>
  </div>
  <div style="font-size:12px;color:var(--muted-foreground);line-height:1.55;margin-top:14px">Restrained black-on-black shadows. Never colored. Never neon glows.</div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Buttons</title></head>
<body><div class="card">
  <style>
    .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-weight:500;font-size:14px;border-radius:10px;padding:0 16px;height:40px;cursor:pointer;border:1px solid transparent;transition:all .15s}
    .btn-lg{height:48px;font-size:16px;padding:0 22px}
    .btn-primary{background:#008000;color:#fff}
    .btn-primary:hover{background:rgba(0,128,0,.9)}
    .btn-outline{background:#fff;color:#1A1A1A;border-color:#E0E0E0}
    .btn-outline:hover{background:#E6F2E6;color:#008000;border-color:#E6F2E6}
    .btn-ghost{background:transparent;color:#1A1A1A}
    .btn-ghost:hover{background:#E6F2E6;color:#008000}
    .btn-destructive{background:#DC2626;color:#fff}
    .lab{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted-foreground);margin-bottom:6px}
    .group{margin-bottom:14px}
  </style>
  <div class="group"><div class="lab">Primary CTA · default + lg</div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-primary">30 Tage testen <span>→</span></button>
      <button class="btn btn-primary btn-lg">Demo buchen</button>
    </div></div>
  <div class="group"><div class="lab">Outline · ghost</div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-outline">Mehr erfahren</button>
      <button class="btn btn-ghost">Abbrechen</button>
    </div></div>
  <div class="group"><div class="lab">Destructive</div>
    <button class="btn btn-destructive">Kunde löschen</button></div>
  <hr class="sep">
  <div style="font-size:12px;color:var(--muted-foreground);line-height:1.55">
    Radius 10px · weight 500 · imperative German labels · <code style="font-family:var(--font-mono);font-size:11px">→</code> arrow on hero CTAs only. Hover = opacity bump or surface-fade to <code style="font-family:var(--font-mono);font-size:11px">brand-50</code>.
  </div>
</div></body></html>
